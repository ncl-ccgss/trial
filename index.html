<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSE Biology: Integrated Cardiac & Tissue Fluid Lab</title>
    <style>
        :root {
            --artery: #ef5350; --vein: #42a5f5; --water: #00e5ff;
            --rbc: #c62828; --cell: #fff3e0; --nucleus: #a1887f;
            --panel: #263238; --heart-red: #d32f2f; --muscle-dark: #b71c1c; --vessel-gray: #9e9e9e;
            --glucose: #ffd54f; --amino: #81c784;
            --ai-primary: #673ab7;
        }
        
        /* 基礎佈局調整：由固定寬度改為響應式最大寬度 */
        body { font-family: "PingFang TC", "Helvetica", sans-serif; background: #eceff1; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; overflow-x: hidden; }
        #main-container { width: 100%; max-width: 1300px; display: flex; flex-direction: column; gap: 20px; }
        
        .section-card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 15px; position: relative; box-sizing: border-box; }
        .part-header { background: #455a64; color: white; display: inline-block; padding: 6px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; font-size: 0.9em; }
        
        /* 控制面板改為自動換行以支援 iPhone */
        .control-panel { background: var(--panel); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; }
        .preset-group { display: flex; flex-direction: row; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); width: 100%; justify-content: center; }
        @media (min-width: 768px) {
            .preset-group { flex-direction: column; width: auto; padding-bottom: 0; padding-right: 20px; border-bottom: none; border-right: 1px solid rgba(255,255,255,0.2); }
            .section-card { padding: 30px; }
        }

        .preset-btn { background: #546e7a; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 0.9em; transition: 0.2s; flex: 1; min-width: 80px; }
        .preset-btn:hover { background: #78909c; }
        .preset-btn.active { background: #ffeb3b; color: #333; font-weight: bold; }

        .gauge-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; flex: 1; min-width: 100px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .gauge-val { font-size: 1.2em; font-weight: bold; color: #ffeb3b; display: block; }

        /* 心臟視窗響應式高度 */
        #heart-viewport { height: 300px; display: flex; align-items: center; justify-content: center; background: #fdfdfd; border-radius: 12px; position: relative; overflow: hidden; }
        #heart-svg { width: 180px; transition: transform 0.1s ease-out; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        @media (min-width: 768px) { #heart-svg { width: 240px; } #heart-viewport { height: 360px; } }
        
        .heart-muscle { fill: var(--heart-red); stroke: var(--muscle-dark); stroke-width: 2.5; }
        .vessels { fill: var(--vessel-gray); stroke: #616161; stroke-width: 1.2; }
        .vessels-dark { fill: #757575; stroke: #424242; stroke-width: 1.2; }
        
        /* 微血管視窗支援橫向捲動或縮放 */
        #viewport-container { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid #ddd; }
        #viewport { position: relative; width: 1240px; height: 450px; background: #fff; }
        
        .cell-layer { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(6, 1fr); opacity: 0.2; pointer-events: none; }
        .cell { border: 1px solid #decba4; background: var(--cell); border-radius: 35%; margin: 6px; display: flex; align-items: center; justify-content: center; }
        .nucleus { width: 6px; height: 6px; background: var(--nucleus); border-radius: 50%; }
        .vessel-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        .p { position: absolute; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); }
        .rbc { background: var(--rbc); width: 20px; height: 20px; z-index: 25; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4); }
        .mol { width: 6px; height: 6px; z-index: 10; }
        .water { background: var(--water); box-shadow: 0 0 4px var(--water); }
        .glucose { background: var(--glucose); border-radius: 2px; box-shadow: 0 0 4px var(--glucose); }
        .amino { background: var(--amino); box-shadow: 0 0 4px var(--amino); }

        .legend-bar { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; font-size: 0.8em; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        /* AI Chatbot 調整以適應小屏幕 */
        #ai-button { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--ai-primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; font-size: 20px; transition: 0.3s; }
        
        #ai-chat-window { position: fixed; bottom: 80px; right: 10px; left: 10px; width: auto; max-width: 350px; height: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 1000; overflow: hidden; border: 1px solid #ddd; margin-left: auto; }
        @media (min-width: 768px) { #ai-chat-window { right: 30px; left: auto; height: 500px; } #ai-button { width: 60px; height: 60px; font-size: 24px; } }

        .chat-header { background: var(--ai-primary); color: white; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .chat-content { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.9em; background: #f9f9f9; display: flex; flex-direction: column; }
        .chat-input-area { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 5px; }
        .chat-input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; } /* 16px 防止 iOS 自動縮放 */
        .ai-msg { background: #e1bee7; padding: 10px; border-radius: 12px; margin-bottom: 10px; align-self: flex-start; max-width: 85%; white-space: pre-wrap; }
        .user-msg { background: #cfd8dc; padding: 10px; border-radius: 12px; margin-bottom: 10px; align-self: flex-end; max-width: 85%; }
    </style>
</head>
<body>

<div id="main-container">
    <div class="section-card">
        <div class="part-header">第一部分：心臟調節 Cardiac Regulation</div>
        <div id="heart-viewport">
            <svg id="heart-svg" viewBox="0 0 220 250">
                <path class="vessels-dark" d="M60,10 L80,10 Q90,30 80,60 L60,60 Z" />
                <path class="vessels-dark" d="M150,70 Q170,60 180,80 L160,100 Z" opacity="0.6" />
                <path class="vessels" d="M90,20 Q115,0 140,20 L140,80 L90,80 Z" /> 
                <path class="vessels" d="M70,40 Q50,30 40,50 L60,95 L80,85 Z" /> 
                <path id="ventricle-body" class="heart-muscle" d="M65,80 L145,80 C165,80 185,120 165,190 C150,240 105,250 105,250 C105,250 60,240 45,190 C25,120 45,80 65,80 Z" />
                <path d="M65,80 Q105,65 145,80" fill="none" stroke="#b71c1c" stroke-width="3"/>
            </svg>
            <div style="position: absolute; right: 10px; top: 10px; text-align: right; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 0.8em;">
                狀態 Status:<br> 
                <b id="heart-state" style="color: var(--heart-red);">舒張期 Diastole</b><br>
                心輸出量 C.O.:<br>
                <span id="co-val" style="font-weight: bold; font-size: 1.1em;">4.9</span> L/min
            </div>
        </div>
        <div class="control-panel">
            <div class="preset-group">
                <button class="preset-btn" onclick="setPreset(70, 70, this)">休息 Rest</button>
                <button class="preset-btn" onclick="setPreset(140, 110, this)">運動 Exercise</button>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="font-size: 0.85em;">心率 HR: <b id="hr-disp">70</b> bpm</label>
                <input type="range" id="hr-slider" min="40" max="180" value="70" style="width: 100%;">
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="font-size: 0.85em;">心搏量 SV: <b id="sv-disp">70</b> ml</label>
                <input type="range" id="sv-slider" min="30" max="150" value="70" style="width: 100%;">
            </div>
            <div class="gauge-box" style="border-color: #ff5252;">
                <span style="font-size: 0.7em;">動脈血壓 Arterial BP</span>
                <span id="bp-result" class="gauge-val">35</span>
            </div>
        </div>
    </div>

    <div class="section-card">
        <div class="part-header">第二部分：組織液形成 Tissue Fluid Formation</div>
        <div class="control-panel" style="background: #37474f;">
            <div class="gauge-box"><span style="font-size: 0.7em;">動脈端 HP</span><span id="hp-entry" class="gauge-val">35</span></div>
            <div class="gauge-box" style="border-color: #03a9f4;"><span style="font-size: 0.7em;">血漿滲透壓 OP</span><span class="gauge-val">25</span></div>
            <div class="gauge-box"><span style="font-size: 0.7em;">靜脈端 HP</span><span id="hp-exit" class="gauge-val">15</span></div>
        </div>
        <div id="viewport-container">
            <div id="viewport">
                <div class="cell-layer" id="cellLayer"></div>
                <svg class="vessel-svg" viewBox="0 0 1240 450">
                    <path id="path0" d="M0,225 L180,225 C350,50 890,50 1060,225 L1240,225" stroke="rgba(211,47,47,0.05)" stroke-width="24" fill="none" />
                    <path id="path1" d="M0,225 L180,225 C350,140 890,140 1060,225 L1240,225" stroke="rgba(211,47,47,0.05)" stroke-width="24" fill="none" />
                    <path id="path2" d="M0,225 L180,225 L1060,225 L1240,225" stroke="rgba(211,47,47,0.05)" stroke-width="24" fill="none" />
                    <path id="path3" d="M0,225 L180,225 C350,310 890,310 1060,225 L1240,225" stroke="rgba(211,47,47,0.05)" stroke-width="24" fill="none" />
                    <path id="path4" d="M0,225 L180,225 C350,400 890,400 1060,225 L1240,225" stroke="rgba(211,47,47,0.05)" stroke-width="24" fill="none" />
                </svg>
            </div>
        </div>
        <div class="legend-bar">
            <div class="legend-item"><div class="dot" style="background:var(--rbc);"></div> RBC</div>
            <div class="legend-item"><div class="dot" style="background:var(--water);"></div> Water</div>
            <div class="legend-item"><div class="dot" style="background:var(--glucose);"></div> Glucose</div>
            <div class="legend-item"><div class="dot" style="background:var(--amino);"></div> Amino</div>
        </div>
    </div>
</div>

<div id="ai-button" onclick="toggleChat()">🤖</div>
<div id="ai-chat-window">
    <div class="chat-header"><span>Bio-AI 自主學習助手</span><span style="cursor:pointer" onclick="toggleChat()">✖</span></div>
    <div class="chat-content" id="chat-box">
        <div class="ai-msg">你好！你可以嘗試問我關於工作紙的問題，例如：<br>1. 為什麼微血管壁只有一層細胞？<br>2. 哪些粒子能穿過管壁？<br>3. 紅血球為什麼出不去？</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="輸入問題..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" style="background:var(--ai-primary); color:white; border:none; padding:8px; border-radius:4px;">發送</button>
    </div>
</div>

<script>
    // --- 核心模擬器邏輯 (保持完全不變) ---
    let hr = 70, sv = 70, arteryHP = 35;
    const heartSvg = document.getElementById('heart-svg');
    const heartBody = document.getElementById('ventricle-body');
    const heartStateTxt = document.getElementById('heart-state');
    
    function setPreset(newHr, newSv, btn) {
        hr = newHr; sv = newSv;
        document.getElementById('hr-slider').value = hr;
        document.getElementById('sv-slider').value = sv;
        document.getElementById('hr-disp').innerText = hr;
        document.getElementById('sv-disp').innerText = sv;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        updateCO();
    }

    function updateCO() {
        let co = (hr * sv) / 1000;
        document.getElementById('co-val').innerText = co.toFixed(1);
        let calculatedBP = Math.round((co / 4.9) * 35);
        calculatedBP = Math.min(65, Math.max(15, calculatedBP));
        document.getElementById('bp-result').innerText = calculatedBP;
        document.getElementById('hp-entry').innerText = calculatedBP;
        document.getElementById('hp-exit').innerText = Math.max(10, calculatedBP - 20);
        arteryHP = calculatedBP;
    }

    function beat() {
        let cycle = 60000 / hr;
        heartBody.style.transition = "d 0.12s cubic-bezier(0.4, 0, 0.2, 1)";
        heartBody.setAttribute('d', `M78,80 L132,80 C145,80 160,120 150,190 C140,220 105,235 105,235 C105,235 70,220 60,190 C50,120 65,80 78,80 Z`);
        heartSvg.style.transform = "scale(0.96) translateY(5px)";
        heartStateTxt.innerHTML = "收縮期<br>Systole";
        heartStateTxt.style.color = "#d32f2f";
        setTimeout(() => {
            heartBody.setAttribute('d', `M65,80 L145,80 C165,80 185,120 165,190 C150,240 105,250 105,250 C105,250 60,240 45,190 C25,120 45,80 65,80 Z`);
            heartSvg.style.transform = "scale(1) translateY(0px)";
            heartStateTxt.innerHTML = "舒張期<br>Diastole";
            heartStateTxt.style.color = "#455a64";
        }, cycle * 0.35);
        setTimeout(beat, cycle);
    }

    document.getElementById('hr-slider').oninput = function() { hr=this.value; document.getElementById('hr-disp').innerText=hr; updateCO(); };
    document.getElementById('sv-slider').oninput = function() { sv=this.value; document.getElementById('sv-disp').innerText=sv; updateCO(); };

    const viewport = document.getElementById('viewport');
    const paths = [0,1,2,3,4].map(i => document.getElementById('path'+i));
    let particles = [];
    for(let i=0; i<84; i++) {
        const c = document.createElement('div'); c.className = 'cell';
        c.innerHTML = '<div class="nucleus"></div>';
        document.getElementById('cellLayer').appendChild(c);
    }

    function createP(type) {
        const pIdx = Math.floor(Math.random() * paths.length);
        const el = document.createElement('div'); el.className = `p ${type}`;
        if (type !== 'rbc') el.classList.add('mol');
        viewport.appendChild(el);
        return { el, type, pIdx, progress: 0, exited: false, drift: 0, side: Math.random() > 0.5 ? 1 : -1 };
    }

    function animate() {
        if (Math.random() > 0.96) particles.push(createP('rbc'));
        if (Math.random() > 0.35) {
            let r = Math.random();
            let type = r < 0.7 ? 'water' : (r < 0.88 ? 'glucose' : 'amino');
            particles.push(createP(type));
        }
        particles.forEach((p, i) => {
            let localHP = arteryHP - (p.progress * 20);
            p.progress += (p.progress < 0.15) ? 0.006 * (arteryHP/35) : (p.progress > 0.85 ? 0.004 : 0.0018);
            const pt = paths[p.pIdx].getPointAtLength(p.progress * paths[p.pIdx].getTotalLength());
            let x = pt.x, y = pt.y;
            if (p.type !== 'rbc') {
                if (p.progress > 0.2 && p.progress < 0.45 && !p.exited && Math.random() < ((localHP-25)*0.015)) p.exited = true;
                if (p.exited && p.progress > 0.75) {
                    p.drift *= 0.85; if (Math.abs(p.drift) < 1.5) p.exited = false;
                }
                if (p.exited) {
                    if (p.progress < 0.65) p.drift = Math.min(p.drift + (localHP/7), 90);
                    y += p.drift * p.side;
                }
            }
            p.el.style.left = x + 'px'; p.el.style.top = y + 'px';
            if (p.progress >= 1) { p.el.remove(); particles.splice(i, 1); }
        });
        requestAnimationFrame(animate);
    }

    // --- 修改後的 AI Chatbot 邏輯 (配合工作紙，數據不變) ---
    function toggleChat() {
        const win = document.getElementById('ai-chat-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }

    function sendMessage() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const userMsg = input.value.trim();
        if(!userMsg) return;

        const userDiv = document.createElement('div');
        userDiv.className = 'user-msg'; userDiv.innerText = userMsg;
        box.appendChild(userDiv);
        
        const msg = userMsg.toLowerCase();
        let reply = "";

        if(msg.includes('一層') || msg.includes('細胞') || msg.includes('厚度') || msg.includes('thin')) {
            reply = "💡 微血管壁只有一層細胞的厚度。這樣的好處是可以縮短擴散距離，從而增加物質交換的速率。";
        } 
        else if(msg.includes('紅血球') || msg.includes('rbc') || msg.includes('不能離開')) {
            reply = "🔍 因為紅血球體積較大，無法通過微血管壁。微血管壁具有差異透性 (Differential permeability)，只容許細小分子通過。";
        } 
        else if(msg.includes('粒子') || msg.includes('穿過') || msg.includes('哪些')) {
            reply = "🧪 能穿過微血管壁的包括：1. 水分子、2. 葡萄糖、3. 氨基酸。它們都是細小分子。";
        } 
        else if(msg.includes('留在血管') || msg.includes('血液中')) {
            reply = "🩸 留在血管內的包括：1. 血細胞 (如紅血球)、2. 血漿蛋白。它們體積太大，無法通過。";
        }
        else if(msg.includes('運動') || msg.includes('exercise')) {
            reply = "🏃 運動時心輸出量增加令靜水壓 (HP) 上昇。在動脈端，更多水分會被逼出形成組織液。";
        }
        else {
            reply = "你可以試著問我關於：微血管厚度、差異透性、或者哪些粒子能穿過管壁。";
        }

        setTimeout(() => {
            const aiDiv = document.createElement('div');
            aiDiv.className = 'ai-msg'; aiDiv.innerText = reply;
            box.appendChild(aiDiv);
            box.scrollTop = box.scrollHeight;
        }, 500);
        input.value = '';
    }

    updateCO(); beat(); animate();
</script>
</body>
</html>
